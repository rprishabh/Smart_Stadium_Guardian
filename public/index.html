<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="utf-8" />


  <link rel="preconnect" href="https://fonts.googleapis.com">

  <!-- Asynchronous Google Fonts Loading -->
  <link rel="preload" as="style" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Outfit:wght@400;500;600;700;800&display=swap" />
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Outfit:wght@400;500;600;700;800&display=swap" media="print" onload="this.media='all'" />
  <noscript>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Outfit:wght@400;500;600;700;800&display=swap" />
  </noscript>
  <!-- Dynamic Browser Tab Icon (Stadium Shield) -->
  <link rel="icon"
    href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🛡️</text></svg>" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta name="theme-color" content="#000000" />

  <!-- Standard Search Engine Metadata -->
  <meta name="description" content="AI-powered multi-user command center for FIFA 2026 volunteer stadium operations." />
  <link rel="apple-touch-icon" href="%PUBLIC_URL%/logo192.png" />
  <link rel="manifest" href="%PUBLIC_URL%/manifest.json" />

  <!-- Open Graph / Meta Tags for Link Sharing (WhatsApp, Discord, LinkedIn, etc.) -->
  <meta property="og:type" content="website" />
  <meta property="og:title" content="Stadium Guardian - FIFA World Cup Ops Centre" />
  <meta property="og:description"
    content="AI-powered multi-user command center for FIFA 2026 volunteer stadium operations." />
  <meta property="og:image" content="https://smart-stadium-guardians.web.app/og-banner.png" />
  <meta property="og:url" content="https://smart-stadium-guardians.web.app/" />

  <!-- Twitter Meta Tags -->
  <meta name="twitter:card" content="summary_large_image" />
  <meta name="twitter:title" content="Stadium Guardian - FIFA World Cup Ops Centre" />
  <meta name="twitter:description"
    content="AI-powered multi-user command center for FIFA 2026 volunteer stadium operations." />
  <meta name="twitter:image" content="https://smart-stadium-guardians.web.app/og-banner.png" />

  <!-- Professional Custom Browser Window Title -->
  <title>Stadium Guardian - FIFA World Cup Ops Centre</title>

</head>

<body>
  <noscript>You need to enable JavaScript to run this app.</noscript>
  <div id="root">
    <!-- Inline static App Shell skeleton for instant paint (LCP/FCP) -->
    <div style="min-height: 100vh; background-color: #020617; padding: 24px; display: flex; flex-direction: column; gap: 24px; font-family: sans-serif;">
      <!-- Header Ticker skeleton -->
      <div style="height: 40px; border-radius: 8px; background-color: #0f172a; width: 100%; border: 1px solid #1e293b;"></div>
      <!-- Workspace split skeleton -->
      <div style="display: flex; gap: 24px; flex: 1;">
         <!-- Sidebar skeleton -->
         <div style="width: 320px; border-radius: 8px; background-color: #0f172a; border: 1px solid #1e293b; height: 500px;"></div>
         <!-- Main Content skeleton -->
         <div style="flex: 1; border-radius: 8px; background-color: #0f172a; border: 1px solid #1e293b; display: flex; align-items: center; justify-content: center; color: #475569; font-size: 14px;">
           Loading Ops Console...
         </div>
      </div>
    </div>
  </div>
</body>

</html>
